<style>
:root{
  --forest:#122922; --gold:#C6A15B; --gold-light:#E4CA95;
  --cream:#FAF7F0; --charcoal:#181510; --ink:#2A2721; --muted:#6B675E; --white:#FFFFFF;
  --font-display:'Fraunces', Georgia, serif; --font-body:'Inter', system-ui, sans-serif;
  --r-pill:999px; --r-lg:24px;
  --shadow-lg:0 24px 70px rgba(18,41,34,0.22); --shadow-gold:0 10px 30px rgba(198,161,91,0.35);
  --t-fast:160ms ease;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{
  font-family:var(--font-body);color:var(--ink);background:var(--forest);
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  padding:2rem;text-align:center;
}
.card{
  background:var(--white);border-radius:var(--r-lg);padding:3rem 2.5rem;
  max-width:460px;box-shadow:var(--shadow-lg);
}
.brand{font-family:var(--font-display);font-weight:700;font-size:1.1rem;color:var(--forest);margin-bottom:1.5rem;display:inline-flex;align-items:center;gap:.5rem;}
.brand img{height:32px;width:32px;border-radius:8px;}
h1{font-family:var(--font-display);font-size:1.8rem;color:var(--charcoal);margin-bottom:.75rem;}
p{color:var(--muted);font-size:.98rem;margin-bottom:2rem;line-height:1.6;}
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:.5rem;
  padding:.9rem 1.8rem;border-radius:var(--r-pill);background:var(--gold);color:var(--charcoal);
  font-weight:600;font-size:.92rem;text-decoration:none;box-shadow:var(--shadow-gold);
  transition:transform var(--t-fast);
}
.btn:hover{transform:translateY(-2px);}
.note{margin-top:1.5rem;font-size:.78rem;color:#B0AAA0;}
</style>
</head>
<body>

  </div>
